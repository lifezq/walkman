name: walkman_flutter
description: A cross-platform music player for Android and iOS
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.0.5
  just_audio: ^0.9.36
  just_audio_background: ^0.0.1-beta.17
  on_audio_query: ^2.9.0
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.3
  file_picker: ^8.0.0
  audio_service: ^0.18.12
  metadata_god: ^1.0.2
  path_provider: ^2.1.3
  http: ^1.6.0
  open_filex: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
